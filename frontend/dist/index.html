    <!-- No canonical here on purpose: this one shell serves every route, so a
         static tag would declare all of them duplicates of '/'. SpaController
         injects a self-referencing one per request; the router keeps it true
         across client-side navigation. -->

    <!-- LCP: the hero Väinö - fetch it before the JS bundle asks for it.
         Only the logged-out landing page ('/') renders it: any other route,
         and logged-in visits to '/' (redirected to the dashboard), would
         download it for nothing - so gate the preload instead of hardcoding it. -->
    <script>
      if (location.pathname === '/' && !localStorage.getItem('token')) {
        var l = document.createElement('link')
        l.rel = 'preload'
        l.as = 'image'
        l.href = '/vaino.webp'
        l.type = 'image/webp'
        l.fetchPriority = 'high'
        document.head.appendChild(l)
      }
    </script>

    <!-- Strip the Google OAuth token out of the URL before the deferred Umami
         script below records the pageview - otherwise the token lands in
         analytics (and shows up as a unique "page"). This runs synchronously
         during parsing, ahead of any deferred script. The token never leaves
         the client: it moves to sessionStorage, and AuthGooglePage reads it
         from there. -->
    <script>
      if (location.pathname === '/auth/google' && location.hash) {
        try { sessionStorage.setItem('oauth_hash', location.hash.slice(1)) } catch (e) { /* private mode */ }
        history.replaceState(null, '', location.pathname + location.search)
      }
    </script>

    <!-- Umami analytics: cookieless + GDPR-friendly (no consent banner needed).
